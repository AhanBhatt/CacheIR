name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: pytest
      - run: python -m cacheir.cli make-tiny /tmp/cacheir-tiny
      - run: python -m cacheir.cli compile /tmp/cacheir-tiny --output /tmp/cacheir-artifact
      - run: python -m cacheir.cli benchmark /tmp/cacheir-artifact --decode-tokens 2 --repeats 1
  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S cpp -B cpp/build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build cpp/build --config Release
